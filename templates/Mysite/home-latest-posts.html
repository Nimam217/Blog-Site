<div class="row">
  <div class="active-recent-blog-carusel">
	{% for post in posts %}
    <div class="single-recent-blog-post item">
      
      <div class="thumb">
        <img style="max-height: 200px" class="img-fluid"  src="{{post.image.url}}" alt="{{post.image}}" />
      </div>
      <div class="details">
        <div class="tags">
          <ul>
            {% for cat  in post.category.all %}
              <li><a href="{% url 'blog:blog-category' cat_name=cat.name %}">{{cat.name }}</a></li>
                        
                          
                        
                          
            {% endfor %}
          </ul>
        </div>
        <a href="{% url 'blog:blog-single' post.pk %}"><h4 class="title">{{post.title}}</h4></a>
        <p>{{post.content|truncatechars:50|safe}}</p>
        <h6 class="date">{{post.published_date|date:'j  F,Y' }}</h6>
      </div>

     
    </div>
	 {% endfor %}
  </div>
</div>
