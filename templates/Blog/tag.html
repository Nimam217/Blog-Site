<!DOCTYPE html>
{% load static %}
 {% load blog-tags %}
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tags</title>
  </head>
  <body>
    <div class="single-sidebar-widget tag-cloud-widget">
      

        
      <h4 class="tagcloud-title">Tag Clouds</h4>
      <ul>
        
        {% for tag in post.tags.all  %}
          
        <li><a href="{% url 'blog:blog-tag' tag_name=tag.name %}">{{tag.name}}</a></li>
        {% endfor %}
          

      </ul>
    </div>
  </body>
</html>
