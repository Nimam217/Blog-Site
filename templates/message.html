{% if messages %}
<div class="container mt-4">
  {% for message in messages %}
  <div
    class="alert alert-{{ message.tags }} alert-dismissible fade show d-flex align-items-center"
    role="alert"
    style="border-radius: 12px"
  >
    <!-- Icon -->
    <span class="mr-2" style="font-size: 1.25rem;">
      {% if message.tags == "success" %} ✅ {% elif message.tags == "error" %}
      ❌ {% elif message.tags == "warning" %} ⚠️ {% else %} ℹ️ {% endif %}
    </span>

    <!-- Message -->
    <div class="flex-grow-1">{{ message }}</div>

    <!-- Close button -->
    <button
      type="button"
      class="close ml-2"
      data-dismiss="alert"
      aria-label="Close"
    >
      <span aria-hidden="true">&times;</span>
    </button>
  </div>
  {% endfor %}
</div>
{% endif %}
