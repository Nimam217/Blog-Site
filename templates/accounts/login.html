{% extends 'base.html' %}
{% load static %}

<link rel="stylesheet" href="{% static 'css/bootstrap.css' %}" />


{% block content %}
    <!-- start banner Area -->
			<section class="relative about-banner">	
				<div class="overlay overlay-bg"></div>
				<div class="container">				
					<div class="row d-flex align-items-center justify-content-center">
						<div class="about-content col-lg-12">
							<h1 class="text-white">
								Login				
							</h1>	
							<p class="text-white link-nav"><a href="{% url 'core:index' %}">Home </a>  <span class="lnr lnr-arrow-right"></span>  <a href="{% url 'accounts:login' %}"> Login</a></p>
						</div>	
					</div>
				</div>
			</section>
			<!-- End banner Area -->
{% include "message.html" %}	
    <div class="container my-5">
    <h2 class="text-center text-primary mb-4">Login</h2>

    <form method="post" class="mx-auto border rounded p-4 shadow" style="max-width: 500px;" action="{% url 'accounts:login' %}">
        {% csrf_token %}
        {{form.as_p}}
        
        {% if request.user.is_authenticated %}
            <p><b><a href="{% url 'accounts:change_password' %}">Do You Want To Change Your Password ?</a></b></p> 
        {% endif %}
            
       
        <button type="submit" class="btn btn-primary w-100 mt-3">Login</button>
		<a href="{% url 'accounts:signup' %}"><button type="button" class="btn btn-secondary w-100 mt-3">create account</button></a>
    </form>
</div>

{% endblock content %}
